
<script>
    (function() {
        // 
        const revealElements = document.querySelectorAll('.post-content p, .post-content h1, .post-content h2, .post-content h3, .post-content h4, .post-content img, .post-content blockquote, .post-content ul, .post-content ol, .post-content table');
        
        if (revealElements.length === 0) return;
        
        // 
        revealElements.forEach(el => {
            el.classList.add('reveal-on-scroll');
        });
        
        // 使用 Intersection Observer 
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    
                }
            });
        }, {
            threshold: 0.15,      
            rootMargin: '0px 0px -50px 0px'  
        });
        
        // 开始监听
        revealElements.forEach(el => {
            observer.observe(el);
        });
    })();
</script>
