
<style>
.reveal-on-scroll {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1), 
                transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.reveal-on-scroll.revealed {
    opacity: 1;
    transform: translateY(0);
}
</style>

<script>
(function() {
    function initScrollReveal() {
        const elements = document.querySelectorAll('#post-content p, #post-content h1, #post-content h2, #post-content h3, #post-content img, #post-content blockquote, #post-content ul, #post-content ol');
        
        if (elements.length === 0) return;
        
        elements.forEach(el => {
            el.classList.add('reveal-on-scroll');
        });
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        
        elements.forEach(el => observer.observe(el));
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initScrollReveal);
    } else {
        initScrollReveal();
    }
})();
</script>
