---
layout: compress
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BubbleMenu — 白の小站 Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ── Reset ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;-webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Source Han Serif SC", "Source Han Serif", serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #b3e8fb 0%, #ddf4ff 60%, #c9effe 100%);
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       BubbleMenu — Nav Bar══════════════════════════════ */
    .bubble-menu {
      left: 0; right: 0; top: 2em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 2em;
      pointer-events: none;
      z-index: 99;
    }
    .bubble-menu.fixed{ position: fixed; }
    .bubble-menu.absolute { position: absolute; }

    .bubble-menu .bubble {
      --bubble-size: 48px;
      width: var(--bubble-size);
      height: var(--bubble-size);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }
    .bubble-menu .logo-bubble,
    .bubble-menu .toggle-bubble { will-change: transform; }

    /* Logo bubble — pill shape */
    .bubble-menu .logo-bubble {
      width: auto;
      min-height: var(--bubble-size);
      height: var(--bubble-size);
      padding: 0 14px;
      border-radius: calc(var(--bubble-size) / 2);
      gap: 8px;
      cursor: pointer;        /* lang switcher */
    }
    .bubble-menu .toggle-bubble {
      width: var(--bubble-size);
      height: var(--bubble-size);
    }

    /* Avatar inside logo bubble */
    .bubble-menu .logo-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .bubble-menu .logo-text {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a3a4a;
      white-space: nowrap;
      line-height: 1;}

    /* Lang badge on logo bubble */
    .bubble-menu .lang-badge {
      font-size: 0.62rem;
      font-weight: 700;
      color: #0a6a8a;
      background: rgba(10,106,138,0.1);
      border-radius: 999px;
      padding: 2px 7px;
      white-space: nowrap;
      line-height: 1.4;
      flex-shrink: 0;
    }

    /* Hamburger button */
    .bubble-menu .menu-btn {
      border: none;
      background: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
    }
    .bubble-menu .menu-line {
      width: 26px; height: 2px;
      background: #1a3a4a;
      border-radius: 2px;
      display: block;
      margin: 0 auto;transition: transform .3s ease, opacity .3s ease;transform-origin: center;
    }
    .bubble-menu .menu-line + .menu-line { margin-top: 6px; }
    .bubble-menu .menu-btn.open .menu-line:first-child {
      transform: translateY(4px) rotate(45deg);
    }
    .bubble-menu .menu-btn.open .menu-line:last-child {
      transform: translateY(-4px) rotate(-45deg);
    }

    @media (min-width: 768px) {
      .bubble-menu .bubble { --bubble-size: 56px; }
      .bubble-menu .logo-bubble { padding: 0 16px; }
      .bubble-menu .logo-avatar { width: 36px; height: 36px; }
      .bubble-menu .logo-text { font-size: 0.85rem; }
    }

    /* ══════════════════════════════
       Lang Panel (popup)
    ══════════════════════════════ */
    #lang-panel-bubble {
      position: fixed;
      z-index: 9999;
      background: #fff;
      border: 1.5px solid rgba(10,106,138,0.18);
      border-radius: 16px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      min-width: 130px;
    }
    #lang-panel-bubble.open { display: flex; }
    .lang-opt-bubble {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
      color: #1a3a4a;
      border: none;
      background: transparent;
      text-align: left;
      font-family: inherit;
    }
    .lang-opt-bubble:hover { background: rgba(10,106,138,0.08); color: #0a6a8a; }
    .lang-opt-bubble.active { color: #0a6a8a; background: rgba(10,106,138,0.12); font-weight: 700; }

    /* ══════════════════════════════
       BubbleMenu — Overlay / Pills
    ══════════════════════════════ */
    .bubble-menu-items {
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 98;
    }
    .bubble-menu-items.fixed{ position: fixed; }
    .bubble-menu-items.absolute { position: absolute; }

    .bubble-menu-items .pill-list {
      list-style: none;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 0; row-gap: 4px;
      width: 100%; max-width: 1600px;
      margin: 0 auto;pointer-events: auto;
      justify-content: stretch;
    }
    .bubble-menu-items .pill-col {
      display: flex;
      justify-content: center;
      align-items: stretch;
      flex: 0 0 calc(100% / 3);
    }
    /* centre last row when4 or5 items */
    .bubble-menu-items .pill-col:nth-child(4):nth-last-child(2) {
      margin-left: calc(100% / 6);
    }
    .bubble-menu-items .pill-col:nth-child(4):last-child {
      margin-left: calc(100% / 3);
    }

    .bubble-menu-items .pill-link {
      --pill-bg: #ffffff;
      --pill-color: #1a3a4a;
      --item-rot: 0deg;
      --pill-min-h: 160px;
      --hover-bg: #f3f4f6;
      --hover-color: #1a3a4a;
      width: 100%;
      min-height: var(--pill-min-h);
      padding: clamp(1.5rem, 3vw, 8rem) 0;
      font-size: clamp(1.5rem, 4vw, 4rem);
      font-weight: 400;
      line-height: 0;
      border-radius: 999px;
      background: var(--pill-bg);
      color: var(--pill-color);
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background .3s ease, color .3s ease;
      will-change: transform;
      white-space: nowrap;
      overflow: hidden;
      height: 10px;
      outline: none;
    }
    .bubble-menu-items .pill-label {
      display: inline-block;
      will-change: transform, opacity;
      height: 1.2em;
      line-height: 1.2;
    }

    @media (min-width: 900px) {
      .bubble-menu-items .pill-link {
        transform: rotate(var(--item-rot));}
      .bubble-menu-items .pill-link:hover {
        transform: rotate(var(--item-rot)) scale(1.06);
        background: var(--hover-bg);
        color: var(--hover-color);
      }
      .bubble-menu-items .pill-link:active {
        transform: rotate(var(--item-rot)) scale(.94);
      }
    }

    @media (max-width: 899px) {
      .bubble-menu-items {
        align-items: flex-start;
        padding-top: 120px;
      }
      .bubble-menu-items .pill-list { row-gap: 16px; }
      .bubble-menu-items .pill-col {
        flex: 0 0 100%;
        margin-left: 0 !important;
        overflow: visible;
      }
      .bubble-menu-items .pill-link {
        font-size: clamp(1.2rem, 3vw, 4rem);
        padding: clamp(1rem, 2vw, 2rem) 0;
        min-height: 80px;
      }
      .bubble-menu-items .pill-link:hover {
        transform: scale(1.06);
        background: var(--hover-bg);
        color: var(--hover-color);
      }
      .bubble-menu-items .pill-link:active { transform: scale(.94); }
    }

    /* ── Demo page body ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      color: #1a3a4a;
      margin-bottom: .5rem;
    }
    .hero p { font-size: 1.1rem; color: #2a5a6a; opacity: .75; }
  </style>
</head>
<body><!-- ① Nav bar -->
  <nav class="bubble-menu absolute" aria-label="Main navigation">

    <!-- Logo bubble — doubles as lang switcher -->
    <div
      id="logoBubble"
      class="bubble logo-bubble"
      role="button"
      tabindex="0"
      aria-label="切换语言"
      style="background:#fff;">
      <img
        class="logo-avatar"
        src="https://i.111666.best/image/XMUuxvqj9mZXisStXImrPR.jpg"
        alt="白の小站头像"
        onerror="this.style.display='none'"
      />
      <span class="logo-text">白の小站</span><span class="lang-badge" id="langBadge">简中</span>
    </div>

    <!-- Hamburger -->
    <button
      type="button"
      id="menuToggle"
      class="bubble toggle-bubble menu-btn"
      aria-label="切换导航菜单"
      aria-pressed="false"
      style="background:#fff;"
    >
      <span class="menu-line"></span>
      <span class="menu-line"></span>
    </button></nav>

  <!-- ② Lang panel popup -->
  <div id="lang-panel-bubble" role="menu" aria-label="语言选择">
    <button class="lang-opt-bubble active" data-lang="zh">简体中文</button>
    <button class="lang-opt-bubble"data-lang="en">English</button>
    <button class="lang-opt-bubble"        data-lang="ja">日本語</button></div>

  <!-- ③ Overlay with pill links -->
  <div id="bubbleOverlay" class="bubble-menu-items absolute" aria-hidden="true">
    <ul class="pill-list" role="menu" aria-label="导航链接"></ul>
  </div>

  <!-- ④ Demo page body -->
  <main class="hero">
    <h1>白の小站</h1>
    <p>点击右上角 ☰ 展开导航 · 点击左上角头像切换语言</p></main>

  <script>
    /* ══════════════════════════════
       i18n — 菜单标签翻译
    ══════════════════════════════ */
    const I18N_LABELS = {
      zh: { home:'首页', categories:'分类', archives:'归档', about:'关于', friends:'友链' },
      en: { home:'Home', categories:'Categories', archives:'Archives', about:'About', friends:'Friends' },
      ja: { home:'ホーム', categories:'カテゴリ', archives:'アーカイブ', about:'概要', friends:'リンク集' },
    };
    const BADGE_LABELS = { zh:'简中', en:'EN', ja:'日本語' };

    /* ══════════════════════════════
       Menu data — 对应你网站的导航
    ══════════════════════════════ */
    const ITEMS = [
      { key:'home',href:'/',ariaLabel:'首页',rotation:-8, hoverStyles:{ bgColor:'#3b82f6', textColor:'#ffffff' } },
      { key:'categories', href:'/categories/', ariaLabel:'分类',rotation: 8, hoverStyles:{ bgColor:'#10b981', textColor:'#ffffff' } },
      { key:'archives',   href:'/archives/',   ariaLabel:'归档',   rotation: 8, hoverStyles:{ bgColor:'#f59e0b', textColor:'#ffffff' } },
      { key:'about',      href:'/about/',      ariaLabel:'关于',   rotation: 8, hoverStyles:{ bgColor:'#f472b6', textColor:'#ffffff' } },
      { key:'friends',    href:'/friends/',    ariaLabel:'友链',   rotation:-8, hoverStyles:{ bgColor:'#8b5cf6', textColor:'#ffffff' } },
    ];

    /* ── Config ── */
    const MENU_BG            = '#ffffff';
    const MENU_CONTENT_COLOR = '#1a3a4a';
    const ANIMATION_EASE     = 'back.out(1.5)';
    const ANIMATION_DURATION = 0.5;
    const STAGGER_DELAY      = 0.12;

    /* ══════════════════════════════
       Build pill DOM
    ══════════════════════════════ */
    const pillList = document.querySelector('.pill-list');
    const bubbles= [];
    const labels   = [];ITEMS.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'pill-col';
      li.setAttribute('role', 'none');

      const a = document.createElement('a');
      a.className = 'pill-link';
      a.href = item.href;
      a.setAttribute('role', 'menuitem');
      a.setAttribute('aria-label', item.ariaLabel);
      a.style.setProperty('--item-rot',`${item.rotation ?? 0}deg`);
      a.style.setProperty('--pill-bg',     MENU_BG);
      a.style.setProperty('--pill-color',  MENU_CONTENT_COLOR);
      a.style.setProperty('--hover-bg',    item.hoverStyles?.bgColor|| '#f3f4f6');
      a.style.setProperty('--hover-color', item.hoverStyles?.textColor  || MENU_CONTENT_COLOR);

      const span = document.createElement('span');
      span.className = 'pill-label';
      // label set by renderLabels() below

      a.appendChild(span);
      li.appendChild(a);
      pillList.appendChild(li);

      bubbles.push(a);
      labels.push(span);
    });

    /* ══════════════════════════════
       Language switcher
    ══════════════════════════════ */
    let curLang = localStorage.getItem('chirpy-lang') || 'zh';

    function renderLabels() {
      const map = I18N_LABELS[curLang] || I18N_LABELS.zh;
      labels.forEach((span, i) => {
        span.textContent = map[ITEMS[i].key] || ITEMS[i].key;
      });
      document.getElementById('langBadge').textContent = BADGE_LABELS[curLang] || curLang;
      document.querySelectorAll('.lang-opt-bubble').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === curLang);
      });
    }

    function setLang(lang) {
      curLang = lang;
      localStorage.setItem('chirpy-lang', lang);
      renderLabels();
    }

    // Init labels
    renderLabels();

    // Lang panel toggle
    const langPanel= document.getElementById('lang-panel-bubble');
    const logoBubble = document.getElementById('logoBubble');

    function openLangPanel() {
      const r = logoBubble.getBoundingClientRect();
      langPanel.style.left= r.left + 'px';
      langPanel.style.top    = (r.bottom + 8) + 'px';
      langPanel.classList.add('open');
    }

    logoBubble.addEventListener('click', e => {
      e.stopPropagation();
      langPanel.classList.contains('open') ? langPanel.classList.remove('open') : openLangPanel();
    });
    logoBubble.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLangPanel(); }
    });
    document.addEventListener('click', () => langPanel.classList.remove('open'));langPanel.addEventListener('click', e => e.stopPropagation());

    document.querySelectorAll('.lang-opt-bubble').forEach(btn => {
      btn.addEventListener('click', () => {
        setLang(btn.dataset.lang);
        langPanel.classList.remove('open');
      });
    });

    /* ══════════════════════════════
       Menu open / close
    ══════════════════════════════ */
    let isOpen = false;
    const toggle= document.getElementById('menuToggle');
    const overlay = document.getElementById('bubbleOverlay');

    toggle.addEventListener('click', () => {
      isOpen = !isOpen;
      toggle.setAttribute('aria-pressed', String(isOpen));
      toggle.classList.toggle('open', isOpen);
      overlay.setAttribute('aria-hidden', String(!isOpen));
      isOpen ? openMenu() : closeMenu();
    });

    /* ══════════════════════════════
       GSAP animations
    ══════════════════════════════ */
    function openMenu() {
      gsap.set(overlay, { display: 'flex' });
      gsap.killTweensOf([...bubbles, ...labels]);
      gsap.set(bubbles, { scale: 0, transformOrigin: '50% 50%' });
      gsap.set(labels,{ y: 24, autoAlpha: 0 });

      bubbles.forEach((bubble, i) => {
        const delay = i * STAGGER_DELAY + gsap.utils.random(-0.05, 0.05);
        const tl = gsap.timeline({ delay });
        tl.to(bubble, { scale: 1, duration: ANIMATION_DURATION, ease: ANIMATION_EASE });
        if (labels[i]) {
          tl.to(labels[i], {
            y: 0, autoAlpha: 1,
            duration: ANIMATION_DURATION,
            ease: 'power3.out',
          }, `-=${ANIMATION_DURATION * 0.9}`);
        }
      });}

    function closeMenu() {
      gsap.killTweensOf([...bubbles, ...labels]);
      gsap.to(labels,  { y: 24, autoAlpha: 0, duration: 0.2, ease: 'power3.in' });
      gsap.to(bubbles, {
        scale: 0, duration: 0.2, ease: 'power3.in',
        onComplete: () => gsap.set(overlay, { display: 'none' }),
      });
    }

    /* ── Resize: re-apply rotation on desktop ── */
    window.addEventListener('resize', () => {
      if (!isOpen) return;
      const isDesktop = window.innerWidth >= 900;
      bubbles.forEach((bubble, i) => {
        gsap.set(bubble, { rotation: isDesktop ? (ITEMS[i].rotation ?? 0) : 0 });
      });
    });</script>
</body>
</html>
