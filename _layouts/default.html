@import url("https://fontsapi.zeoseven.com/285/main/result.css");

@keyframes pageSlideUp {
  from {
    opacity: 0;
    transform: translateY(28px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

body,
html {
  font-family: "Source Han Serif SC", "Source Han Serif", serif !important;
}

html {
  width: 100%;
  overflow-x: hidden;
}

body {
  width: 100%;
  min-height: 100vh;
  overflow-x: clip;
  margin: 0;
}

html.menu-open,
body.menu-open {
  overflow: hidden !important;
  touch-action: none !important;
}

.glass-panel {
  background: rgba(255, 255, 255, 0.82);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255, 255, 255, 0.95);
  border-left: 1px solid rgba(255, 255, 255, 0.95);
  border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  border-right: 1px solid rgba(0, 0, 0, 0.08);
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
}

#site-top-menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 72px;
  z-index: 9997;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  box-sizing: border-box;
}

#menu-toggle {
  position: relative;
  z-index: 1;
  border: none;
  outline: none;
  background: transparent;
  color: #111;
  cursor: pointer;
  padding: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s, color 0.3s;
}

#menu-toggle:hover {
  color: #666;
}

#menu-toggle:active {
  transform: scale(0.95);
}

#site-top-title {
  display: none;
}

#mobile-menu {
  position: fixed;
  inset: 0;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(255, 255, 255, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  overscroll-behavior: contain;
}

#mobile-menu.is-open {
  opacity: 1;
  pointer-events: auto;
}

#menu-close {
  position: absolute;
  top: 24px;
  right: 24px;
  border: none;
  outline: none;
  background: transparent;
  color: #111;
  cursor: pointer;
  padding: 8px;
  transition: transform 0.3s, color 0.3s;
}

#menu-close:hover {
  color: #666;
  transform: scale(1.1);
}

#mobile-menu nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

#mobile-menu .menu-item {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.5s, transform 0.5s, color 0.3s;
  color: #111;
  font-size: 1.875rem;
  line-height: 2.25rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
}

#mobile-menu .menu-item:hover {
  color: #666;
}

#mobile-menu.is-open .menu-item {
  opacity: 1;
  transform: translateY(0);
}

#mobile-menu .menu-item:nth-child(1) {
  transition-delay: 150ms;
}

#mobile-menu .menu-item:nth-child(2),
#mobile-menu .menu-item:nth-child(3),
#mobile-menu .menu-item:nth-child(4) {
  transition-delay: 100ms;
}

#sidebar,
.sidebar,
#topbar-wrapper,
#topbar,
#breadcrumb,
.breadcrumb,
#search-trigger,
#panel-wrapper,
#mask {
  display: none !important;
}
