<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>White · 白</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f472b6;
    --mauve: #d8b4fe;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #000;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LetterGlitch fixed background ── */
  #glitch-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
  }
  #glitch-bg canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #glitch-bg .vignette-outer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,1) 100%);
  }
  #glitch-bg .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(0,0,0,0.55);
  }

  /* ── Page layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Hero ── */
  .hero {
    width: 100%;
    padding-top: 72px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }
  .welcome-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }
  .welcome-tag .line {
    display: inline-block;
    width: 24px; height: 1px;
    background: linear-gradient(90deg, var(--rose), var(--mauve));
  }
  .hero-name-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(3rem, 10vw, 4.2rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .hero-name-en {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(3rem, 10vw, 4.2rem);
    font-style: italic;
    line-height: 1.05;
    margin-bottom: 28px;
  }
  .gradient-text {
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-desc {
    font-size: 0.9rem;
    line-height: 2;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    margin-bottom: 10px;
  }
  .hero-desc strong { font-weight: 500; color: rgba(255,255,255,0.88); }

  /* ── Typewriter ── */
  .typewriter-wrap { margin: 20px 0 28px; min-height: 3rem; }
  .typewriter-text {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cursor {
    display: inline-block;
    width: 3px; height: 0.85em;
    background: var(--rose);
    margin-left: 2px;
    vertical-align: middle;
    border-radius: 2px;
    animation: cursorBlink 0.7s step-end infinite;
  }
  @keyframes cursorBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* ── Tags ── */
  .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .tag { padding: 5px 16px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em; border: 1.5px solid transparent; }
  .tag-yellow { background: rgba(254,249,195,0.1); color: #fde68a; border-color: rgba(253,230,138,0.25); }
  .tag-purple { background: rgba(237,233,254,0.1); color: #c4b5fd; border-color: rgba(196,181,253,0.25); }
  .tag-blue   { background: rgba(219,234,254,0.1); color: #93c5fd; border-color: rgba(147,197,253,0.25); }

  /* ── CTA Buttons ── */
  .cta-group {
    width: 100%; max-width: 280px;
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 36px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.45s forwards;
  }
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: #fff; border-radius: 999px;
    font-size: 0.88rem; font-weight: 600; letter-spacing: 0.06em;
    text-decoration: none;
    box-shadow: 0 8px 28px rgba(244,114,182,0.38);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(244,114,182,0.52); }
  .btn-secondary {
    display: flex; align-items: center; justify-content: center;
    padding: 13px 28px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.82); border-radius: 999px;
    font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em;
    text-decoration: none;
    border: 1.5px solid rgba(244,114,182,0.28);
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--rose); background: rgba(249,168,201,0.1); transform: translateY(-2px); }

  /* ── Section label ── */
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin: 56px 0 24px;
  }
  .section-label .line {
    display: inline-block; width: 24px; height: 1px;
    background: linear-gradient(90deg, var(--rose), var(--mauve));
  }

  /* ══════════════════════════════
     CircularGallery
     ══════════════════════════════ */
  .gallery-wrap {
    width: 100vw;
    height: 600px;
    position: relative;
    margin-left: calc(-50vw + 50%);
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
  }
  #circular-gallery-canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #circular-gallery-canvas:active { cursor: grabbing; }

    /* ── Recent posts ── */
  .posts-section { width: 100%; margin-top: 56px; }
  .post-card {
    display: block; padding: 18px 20px;
    border-radius: 18px;
    border: 1.5px solid rgba(244,114,182,0.14);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    text-decoration: none; color: #fff;
    transition: all 0.25s; margin-bottom: 12px;

  }
  .post-card:hover { border-color: rgba(244,114,182,0.38); background: rgba(255,255,255,0.08); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(244,114,182,0.13); }
  .post-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .post-date { font-size:0.65rem; color:rgba(255,255,255,0.32); letter-spacing:0.04em; }
  .post-category { font-size:0.62rem; padding:2px 10px; border-radius:999px; background:rgba(244,114,182,0.14); color:var(--rose); font-weight:600; border:1px solid rgba(244,114,182,0.22); }
  .post-title { font-family:'Noto Serif SC',serif; font-size:0.97rem; font-weight:700; margin-bottom:5px; line-height:1.45; color:rgba(255,255,255,0.88); }
  .post-excerpt { font-size:0.8rem; color:rgba(255,255,255,0.38); line-height:1.7; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* ── Keyframes ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:translateY(0);} }
  @keyframes postIn { to{opacity:1;transform:translateY(0);} }
</style>

<script>
// ════════════════════════════════
//  LetterGlitch — #55CDFC #F7A8B8 #FFFFFF
// ════════════════════════════════
(function(){
  var glitchColors = ['#55CDFC', '#F7A8B8', '#FFFFFF'];
  var glitchSpeed = 50, smooth = true;
  var characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$&*()-_+=/[]{};:<>.,0123456789';
  var chars = Array.from(characters);
  var canvas = document.getElementById('glitch-canvas');
  var ctx = canvas.getContext('2d');
  var fontSize = 16, charWidth = 10, charHeight = 20;
  var letters = [], columns = 0, rows = 0;
  var lastTime = Date.now(), animId;

  function rChar(){ return chars[Math.floor(Math.random()*chars.length)]; }
  function rColor(){ return glitchColors[Math.floor(Math.random()*glitchColors.length)]; }

  function hexToRgb(hex){
    if(!hex||hex[0]!=='#') return null;
    hex = hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i, function(m,r,g,b){ return r+r+g+g+b+b; });
    var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? { r:parseInt(r[1],16), g:parseInt(r[2],16), b:parseInt(r[3],16) } : null;
  }
  function lerp(a,b,t){
    return 'rgb('+Math.round(a.r+(b.r-a.r)*t)+','+Math.round(a.g+(b.g-a.g)*t)+','+Math.round(a.b+(b.b-a.b)*t)+')';
  }

  function init(cols, rws){
    columns = cols; rows = rws; letters = [];
    for(var i=0; i<cols*rws; i++)
      letters.push({ char:rChar(), color:rColor(), target:rColor(), progress:1 });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.font = fontSize+'px monospace';
    ctx.textBaseline = 'top';
    for(var i=0; i<letters.length; i++){
      ctx.fillStyle = letters[i].color;
      ctx.fillText(letters[i].char, (i%columns)*charWidth, Math.floor(i/columns)*charHeight);
    }
  }

  function update(){
    var n = Math.max(1, Math.floor(letters.length*0.05));
    for(var i=0; i<n; i++){
      var idx = Math.floor(Math.random()*letters.length);
      letters[idx].char = rChar();
      letters[idx].target = rColor();
      if(smooth){ letters[idx].progress = 0; }
      else { letters[idx].color = letters[idx].target; letters[idx].progress = 1; }
    }
  }

  function smoothStep(){
    var dirty = false;
    for(var i=0; i<letters.length; i++){
      var l = letters[i];
      if(l.progress < 1){
        l.progress = Math.min(1, l.progress + 0.05);
        var s = hexToRgb(l.color), e = hexToRgb(l.target);
        if(s && e){ l.color = lerp(s,e,l.progress); dirty = true; }
        else { l.color = l.target; l.progress = 1; }
      }
    }
    if(dirty) draw();
  }

  function resize(){
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth, h = window.innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    init(Math.ceil(w/charWidth), Math.ceil(h/charHeight));
    draw();
  }

  function animate(){
    var now = Date.now();
    if(now - lastTime >= glitchSpeed){ update(); draw(); lastTime = now; }
    if(smooth) smoothStep();
    animId = requestAnimationFrame(animate);
  }

  resize(); animate();
  var t;
  window.addEventListener('resize', function(){
    clearTimeout(t);
    t = setTimeout(function(){ cancelAnimationFrame(animId); resize(); animate(); }, 100);
  });
})();

// ════════════════════════════════
//  CircularGallery (canvas-based)
//  bend=-8, borderRadius=0.05, scrollSpeed=2, scrollEase=0.05
// ════════════════════════════════
(function(){
  var canvas = document.getElementById('circular-gallery-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');

  var items = [
    { src: 'https://picsum.photos/seed/g1/400/300', label: 'Moments' },
    { src: 'https://picsum.photos/seed/g2/400/300', label: 'Travel' },
    { src: 'https://picsum.photos/seed/g3/400/300', label: 'Nature' },
    { src: 'https://picsum.photos/seed/g4/400/300', label: 'Life' },
    { src: 'https://picsum.photos/seed/g5/400/300', label: 'Art' },
    { src: 'https://picsum.photos/seed/g6/400/300', label: 'Friends' },
    { src: 'https://picsum.photos/seed/g7/400/300', label: 'Dreams' },
    { src: 'https://picsum.photos/seed/g8/400/300', label: 'Study' }
  ];

  var BEND = -8;
  var SCROLL_SPEED = 2;
  var SCROLL_EASE = 0.05;
  var RADIUS_RATIO = 0.05;
  var TEXT_COLOR = '#ffffff';

  var dpr = window.devicePixelRatio || 1;
  var images = new Array(items.length).fill(null);
  var loadedCount = 0;

  items.forEach(function(item, i) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { images[i] = img; loadedCount++; };
    img.onerror = function() { loadedCount++; };
    img.src = item.src;
  });

  var scrollPos = 0, targetScroll = 0;
  var dragging = false, dragStartX = 0, scrollAtDrag = 0;
  var animId;

  function resize() {
    var wrap = canvas.parentElement;
    var w = wrap.offsetWidth, h = wrap.offsetHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function draw() {
    var W = canvas.width / dpr, H = canvas.height / dpr;
    ctx.clearRect(0, 0, W, H);

    var n = items.length;
    var cardW = Math.min(240, W * 0.4);
    var cardH = cardW * 0.68;
    var gap = cardW * 0.3;
    var step = cardW + gap;
    var totalW = step * n;
    var scroll = ((scrollPos % totalW) + totalW) % totalW;
    var cx = W / 2, cy = H / 2;
    var bendMag = Math.abs(BEND) * 5;

    for (var i = 0; i < n; i++) {
      var rawX = (i * step - scroll + totalW * 10) % totalW;
      var relX = rawX - totalW / 2;
      var screenX = cx + relX;
      if (screenX > W + cardW || screenX + cardW < -cardW) continue;

      var normX = relX / (W * 0.8);
      normX = Math.max(-1, Math.min(1, normX));
      // bend: negative = concave up (items near center higher)
      var bendY = BEND < 0
        ? bendMag * (normX * normX)
        : -bendMag * (normX * normX);

      var distAbs = Math.abs(normX);
      var scale = 1 - distAbs * 0.2;
      scale = Math.max(0.72, Math.min(1, scale));
      var alpha = 1 - distAbs * 0.35;
      alpha = Math.max(0.45, alpha);

      var w = cardW * scale, h = cardH * scale;
      var x = cx + relX - w / 2, y = cy - h / 2 + bendY;
      var r = w * RADIUS_RATIO;

      ctx.save();
      ctx.globalAlpha = alpha;
      // shadow
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 20 * scale;
      ctx.shadowOffsetY = 6 * scale;

      roundRect(x, y, w, h, r);
      ctx.clip();

      var img = images[i];
      if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, x, y, w, h);
      } else {
        var grad = ctx.createLinearGradient(x, y, x+w, y+h);
        grad.addColorStop(0, 'rgba(244,114,182,0.5)');
        grad.addColorStop(1, 'rgba(196,181,253,0.5)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);
        // placeholder text
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = Math.round(11*scale) + 'px DM Sans, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0;
        ctx.fillText('Loading…', x + w/2, y + h/2);
      }
      ctx.restore();

      // label below card
      ctx.save();
      ctx.globalAlpha = alpha * 0.85;
      ctx.font = '500 ' + Math.round(12*scale) + 'px "DM Sans", sans-serif';
      ctx.fillStyle = TEXT_COLOR;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 4;
      ctx.fillText(items[i].label, x + w/2, y + h + 8*scale);
      ctx.restore();
    }
  }

  function loop() {
    scrollPos += (targetScroll - scrollPos) * SCROLL_EASE;
    draw();
    animId = requestAnimationFrame(loop);
  }

  // Auto-scroll
  setInterval(function() { if (!dragging) targetScroll += SCROLL_SPEED; }, 16);

  // Mouse wheel
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    targetScroll += (e.deltaX || e.deltaY) * 0.8;
  }, { passive: false });

  // Mouse drag
  canvas.addEventListener('mousedown', function(e) {
    dragging = true; dragStartX = e.clientX; scrollAtDrag = targetScroll;
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    targetScroll = scrollAtDrag - (e.clientX - dragStartX) * 2;
  });
  window.addEventListener('mouseup', function() { dragging = false; });

  // Touch
  canvas.addEventListener('touchstart', function(e) {
    dragging = true; dragStartX = e.touches[0].clientX; scrollAtDrag = targetScroll;
  }, { passive: true });
  canvas.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    targetScroll = scrollAtDrag - (e.touches[0].clientX - dragStartX) * 2;
  }, { passive: true });
  canvas.addEventListener('touchend', function() { dragging = false; });

  window.addEventListener('resize', function() { resize(); });

  resize();
  loop();
})();

// ════════════════════════════════
//  Typewriter
// ════════════════════════════════
(function(){
  var texts = ['無限進步','我爱你们'];
  var el = document.getElementById('typewriter');
  var ti=0, ci=0, del=false;
  function tick(){
    var f = texts[ti];
    if(!del){ ci++; el.textContent=f.slice(0,ci); if(ci===f.length){del=true;setTimeout(tick,1800);return;} setTimeout(tick,130); }
    else { ci--; el.textContent=f.slice(0,ci); if(ci===0){del=false;ti=(ti+1)%texts.length;setTimeout(tick,400);return
