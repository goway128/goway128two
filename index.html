<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 80px);padding:20px 16px 48px;gap:0;">

  <script>
  (function(){
    var cards=[
      {icon:'<i class="fa-solid fa-code"></i>', label:'', tag:''},
      {icon:'<i class="fa-solid fa-blog"></i>', label:'', tag:''},
      {icon:'<i class="fa-solid fa-circle-nodes"></i>', label:'', tag:''}
    ];
    var cur=0, total=cards.length, autoTimer, isAnimating=false;
    var wrap=document.getElementById('stackWrap');
    var dots=document.querySelectorAll('.stack-dot');

    function updateDots(){
      dots.forEach(function(d,i){d.classList.toggle('active',i===cur);});
    }

    function setCard(el, ci){
      var c=cards[(ci+total)%total];
      el.querySelector('.stack-emoji').innerHTML=c.icon;
      el.querySelector(el.id==='sCard1'?'.stack-label':'div:last-child').textContent=c.label;
      var di=(ci+total)%total;
      el.dataset.idx=di;
    }

    function next(){
      if(isAnimating)return;
      isAnimating=true;
      var c1=document.getElementById('sCard1');
      c1.classList.add('shuffling');
      setTimeout(function(){
        cur=(cur+1)%total;
        setCard(document.getElementById('sCard1'),cur);
        setCard(document.getElementById('sCard2'),(cur+1)%total);
        setCard(document.getElementById('sCard3'),(cur+2)%total);
        updateDots();
        c1.classList.remove('shuffling');
        isAnimating=false;
      },250);
    }

    function prev(){
      if(isAnimating)return;
      isAnimating=true;
      var c1=document.getElementById('sCard1');
      c1.classList.add('shuffling');
      setTimeout(function(){
        cur=(cur-1+total)%total;
        setCard(document.getElementById('sCard1'),cur);
        setCard(document.getElementById('sCard2'),(cur+1)%total);
        setCard(document.getElementById('sCard3'),(cur+2)%total);
        updateDots();
        c1.classList.remove('shuffling');
        isAnimating=false;
      },250);
    }

    wrap.addEventListener('click',function(){next();});
    dots.forEach(function(d){
      d.addEventListener('click',function(e){
        e.stopPropagation();
        cur=(+d.dataset.i-1+total)%total;
        next();
      });
    });

    function startAuto(){autoTimer=setInterval(next,3500);}
    function stopAuto(){clearInterval(autoTimer);}
    startAuto();
    wrap.addEventListener('mouseenter',stopAuto);
    wrap.addEventListener('mouseleave',startAuto);
    wrap.addEventListener('pointerdown',function(e){stopAuto();});
    wrap.addEventListener('pointerup',function(e){ startAuto(); });
  })();
  </script>

.card-stack-wrap {

  background-position: center;
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  border: 1.5px solid rgba(255,255,255,0.8);
  will-change: transform;
  backface-visibility: hidden;
  transform-origin: center center;
  transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

}

.img-stack-card-3 {
