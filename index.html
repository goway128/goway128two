<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>White · 白</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f472b6;
    --mauve: #d8b4fe;
    --cream: #fdf6f0;
    --ink: #1a1118;
    --muted: #7a6672;
    --card-bg: rgba(255,255,255,0.62);
    --card-border: rgba(244,114,182,0.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scroll-behavior: smooth;
    overflow-x: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  /* ── Background blobs ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }

  .blob-1 {
    width: min(500px, 90vw);
    height: min(500px, 90vw);
    background: radial-gradient(circle, #f9a8c9 0%, #fce7f3 60%, transparent 100%);
    opacity: 0.45;
    top: -120px;
    right: -80px;
    animation: blobDrift 14s ease-in-out infinite;
  }

  .blob-2 {
    width: min(380px, 75vw);
    height: min(380px, 75vw);
    background: radial-gradient(circle, #fde68a 0%, #fef3c7 60%, transparent 100%);
    opacity: 0.35;
    bottom: 80px;
    left: -60px;
    animation: blobDrift 14s ease-in-out 4s infinite;
  }

  .blob-3 {
    width: min(300px, 65vw);
    height: min(300px, 65vw);
    background: radial-gradient(circle, #c4b5fd 0%, #ede9fe 60%, transparent 100%);
    opacity: 0.3;
    top: 45%;
    left: 38%;
    animation: blobDrift 14s ease-in-out 8s infinite;
  }

  @keyframes blobDrift {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-30px) scale(1.06); }
  }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Hero section ── */
  .hero {
    width: 100%;
    padding-top: 72px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }

  .welcome-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 28px;
  }

  .welcome-tag span.line {
    display: inline-block;
    width: 24px;
    height: 1px;
    background: linear-gradient(90deg, var(--rose), var(--mauve));
  }

  .hero-name-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(3rem, 10vw, 4.2rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .hero-name-en {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(3rem, 10vw, 4.2rem);
    font-style: italic;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 28px;
  }

  .gradient-text {
    background: linear-gradient(135deg, var(--rose) 0%, var(--mauve) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 0.9rem;
    line-height: 2;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 10px;
  }

  .hero-desc strong {
    font-weight: 500;
    color: var(--ink);
  }

  /* ── Typewriter ── */
  .typewriter-wrap {
    margin: 20px 0 28px;
    min-height: 3rem;
  }

  .typewriter-text {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: var(--rose);
    margin-left: 2px;
    vertical-align: middle;
    border-radius: 2px;
    animation: cursorBlink 0.7s step-end infinite;
  }

  @keyframes cursorBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* ── Tags ── */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 0;
  }

  .tag {
    padding: 5px 16px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1.5px solid transparent;
  }

  .tag-yellow { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
  .tag-purple { background: #ede9fe; color: #6d28d9; border-color: #c4b5fd; }
  .tag-blue   { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }

  /* ── CTA Buttons ── */
  .cta-group {
    width: 100%;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 36px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.45s forwards;
  }

  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: #fff;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-decoration: none;
    box-shadow: 0 8px 28px rgba(244,114,182,0.38);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(244,114,182,0.52);
  }

  .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 13px 28px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    color: var(--ink);
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-decoration: none;
    border: 1.5px solid rgba(244,114,182,0.25);
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--rose);
    background: rgba(249,168,201,0.1);
    transform: translateY(-2px);
  }

  /* ── Divider ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin: 56px 0 24px;
  }

  .section-label .line {
    display: inline-block;
    width: 24px;
    height: 1px;
    background: linear-gradient(90deg, var(--rose), var(--mauve));
  }

  /* ── Image stack ── */
  .card-stack-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
  }

  .card-stack-container {
    position: relative;
    width: min(280px, 78vw);
    height: 320px;
    cursor: pointer;
    transition: height 0.6s cubic-bezier(0.22,1,0.36,1);
  }

  .card-stack-container.expanded {
    height: 580px;
  }

  .img-stack-card {
    position: absolute;
    width: 100%;
    height: 170px;
    left: 0;
    border-radius: 24px;
    background-size: cover;
    background-position: center;
    box-shadow: 0 10px 40px rgba(244,114,182,0.15), 0 2px 10px rgba(0,0,0,0.08);
    transition: transform 0.6s cubic-bezier(0.22,1,0.36,1), top 0.6s cubic-bezier(0.22,1,0.36,1);
    border: 2px solid rgba(255,255,255,0.9);
    will-change: transform;
  }

  .img-stack-card-1 {
    background-image: url('https://i.111666.best/image/IpBLfH1Xm51hQolNPi13vK.jpg');
    top: 0; transform: scale(1); z-index: 3;
  }
  .img-stack-card-2 {
    background-image: url('https://i.111666.best/image/8HanhhzvtKZnqt8ID3Vap1.jpg');
    top: 80px; transform: scale(0.96); z-index: 2;
  }
  .img-stack-card-3 {
    background-image: url('https://i.111666.best/image/tybCKLwAIS5PE91vsk08IE.png');
    top: 160px; transform: scale(0.92); z-index: 1;
  }

  .card-stack-container.expanded .img-stack-card-1 { top: 0; transform: scale(1); }
  .card-stack-container.expanded .img-stack-card-2 { top: 200px; transform: scale(1); }
  .card-stack-container.expanded .img-stack-card-3 { top: 400px; transform: scale(1); }

  .stack-hint {
    text-align: center;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-top: 10px;
    opacity: 0.6;
  }

  /* ── Recent posts ── */
  .posts-section {
    width: 100%;
    margin-top: 56px;
  }

  .post-card {
    display: block;
    padding: 18px 20px;
    border-radius: 18px;
    border: 1.5px solid var(--card-border);
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    text-decoration: none;
    color: var(--ink);
    transition: all 0.25s;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(18px);
  }

  .post-card:hover {
    border-color: rgba(244,114,182,0.4);
    background: rgba(255,255,255,0.8);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(244,114,182,0.12);
  }

  .post-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .post-date {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .post-category {
    font-size: 0.62rem;
    padding: 2px 10px;
    border-radius: 999px;
    background: rgba(244,114,182,0.1);
    color: var(--rose);
    font-weight: 600;
    border: 1px solid rgba(244,114,182,0.2);
  }

  .post-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.97rem;
    font-weight: 700;
    margin-bottom: 5px;
    line-height: 1.45;
    color: var(--ink);
  }

  .post-excerpt {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes postIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .page { padding: 0 16px 80px; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="page">

  <!-- ══ Hero ══ -->
  <section class="hero">

    <p class="welcome-tag">
      <span class="line"></span>
      Welcome to my space · 窝爱泥们
      <span class="line"></span>
    </p>

    <h1 class="hero-name-zh">
      你好，我是<span class="gradient-text">白</span>
    </h1>
    <h1 class="hero-name-en">
      Hello, I'm <span class="gradient-text">White</span>
    </h1>

    <p class="hero-desc">
      一个来自 <strong>中国</strong> 的在校中学生<br>
      A middle school student from <strong>China</strong>
    </p>

    <p class="hero-desc">
      我目前正在学习 <strong>英语</strong> 这个语言<br>
      I'm currently learning the <strong>English</strong> language
    </p>

    <!-- Typewriter -->
    <div class="typewriter-wrap">
      <span class="typewriter-text" id="typewriter"></span><span class="cursor"></span>
    </div>

    <!-- Tags -->
    <div class="tags">
      <span class="tag tag-yellow">📖 note</span>
      <span class="tag tag-purple">🍥 develop</span>
      <span class="tag tag-blue">🇨🇳 CN</span>
    </div>

  </section>

  <!-- ══ CTA ══ -->
  <div class="cta-group">
    <a href="/categories/" class="btn-primary">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      分类
    </a>
    <a href="/about/" class="btn-secondary">关于本站</a>
  </div>

  <!-- ══ Image Stack ══ -->
  <div class="section-label">
    <span class="line"></span>
    Gallery
    <span class="line"></span>
  </div>

  <div class="card-stack-wrap">
    <div>
      <div class="card-stack-container" id="myStack">
        <div class="img-stack-card img-stack-card-1"></div>
        <div class="img-stack-card img-stack-card-2"></div>
        <div class="img-stack-card img-stack-card-3"></div>
      </div>
      <p class="stack-hint">点击展开 · click to expand</p>
    </div>
  </div>

  <!-- ══ Recent Posts ══ -->
  <div class="posts-section">
    <div class="section-label" id="posts-anchor">
      <span class="line"></span>
      最新文章
      <span class="line"></span>
    </div>

    <div id="posts-list">
      <!-- Jekyll template: replace with your actual posts -->
      <a href="#" class="post-card">
        <div class="post-meta">
          <span class="post-date">2024/01/01</span>
          <span class="post-category">笔记</span>
        </div>
        <div class="post-title">示例文章标题</div>
        <div class="post-excerpt">这里是文章的摘要，描述文章的主要内容，最多显示两行...</div>
      </a>
    </div>
  </div>

</div>

<script>
// ── Typewriter ──
(function(){
  var texts = ['無限進步', '我爱你们'];
  var el = document.getElementById('typewriter');
  var ti = 0, ci = 0, deleting = false;
  function tick() {
    var full = texts[ti];
    if (!deleting) {
      ci++; el.textContent = full.slice(0, ci);
      if (ci === full.length) { deleting = true; setTimeout(tick, 1800); return; }
      setTimeout(tick, 130);
    } else {
      ci--; el.textContent = full.slice(0, ci);
      if (ci === 0) { deleting = false; ti = (ti+1) % texts.length; setTimeout(tick, 400); return; }
      setTimeout(tick, 65);
    }
  }
  setTimeout(tick, 900);
})();

// ── Image stack toggle ──
(function(){
  var el = document.getElementById('myStack');
  el.addEventListener('click', function(){ el.classList.toggle('expanded'); });
})();

// ── Post cards scroll reveal ──
(function(){
  var observer = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) {
        var cards = document.querySelectorAll('.post-card');
        cards.forEach(function(c, i){
          c.style.animation = 'postIn 0.55s cubic-bezier(0.22,1,0.36,1) ' + (i * 0.1 + 0.05) + 's forwards';
        });
        observer.disconnect();
      }
    });
  }, { threshold: 0.1 });
  var anchor = document.getElementById('posts-anchor');
  if (anchor) observer.observe(anchor);
})();
</script>

</body>
</html>
