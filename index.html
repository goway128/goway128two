<script>
(function(){
  var track = document.getElementById('heroTrack');
  var dots  = document.querySelectorAll('.hdot');
  var total = 3, cur = 0, autoTimer, startX = 0;

  function goTo(n) {
    cur = (n + total) % total;
    track.style.transform = 'translateX(-' + (cur * 100) + '%)';
    dots.forEach(function(d, i) {
      d.style.background    = i === cur ? '#aaa' : 'rgba(128,128,128,0.3)';
      d.style.transform     = i === cur ? 'scale(1.35)' : 'scale(1)';
    });
  }

  document.getElementById('heroNext').addEventListener('click', function(){ goTo(cur+1); });
  document.getElementById('heroPrev').addEventListener('click', function(){ goTo(cur-1); });
  dots.forEach(function(d){ d.addEventListener('click', function(){ goTo(+d.dataset.i); }); });

  function startAuto(){ autoTimer = setInterval(function(){ goTo(cur+1); }, 3500); }
  function stopAuto(){ clearInterval(autoTimer); }
  startAuto();
  track.parentElement.addEventListener('mouseenter', stopAuto);
  track.parentElement.addEventListener('mouseleave', startAuto);
  track.addEventListener('pointerdown', function(e){ startX = e.clientX; stopAuto(); });
  track.addEventListener('pointerup', function(e){
    var dx = e.clientX - startX;
    if(Math.abs(dx) > 40) goTo(dx < 0 ? cur+1 : cur-1);
    startAuto();
  });
})();
</script>
